version: "3.9"

services:

  app:
    build:
      context: .
      dockerfile: ./Dockerfile

    container_name: inventory_app

    restart: unless-stopped

    working_dir: /var/www

    volumes:
      - .:/var/www

    environment:
      DB_HOST: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27

    container_name: inventory_nginx

    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

  postgres:
    image: postgres:17

    container_name: inventory_postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7

    container_name: inventory_redis

    restart: unless-stopped

    command: redis-server --requirepass ${REDIS_PASSWORD}

    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  reverb:
    build:
      context: .
      dockerfile: ./Dockerfile

    container_name: inventory_reverb

    restart: unless-stopped

    working_dir: /var/www

    command: php artisan reverb:start --host=0.0.0.0 --port=8080

    volumes:
      - .:/var/www

    ports:
      - "8080:8080"

    environment:
      DB_HOST: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}

    depends_on:
      - app
      - redis

  queue:
    build:
      context: .
      dockerfile: ./Dockerfile

    container_name: inventory_queue

    restart: unless-stopped

    working_dir: /var/www

    command: php artisan horizon

    volumes:
      - .:/var/www

    environment:
      DB_HOST: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: ./Dockerfile

    container_name: inventory_scheduler

    restart: unless-stopped

    working_dir: /var/www

    command: php artisan schedule:work

    volumes:
      - .:/var/www

    environment:
      DB_HOST: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
